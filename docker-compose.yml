services:
  mariadb:
    image: mariadb:11.4
    container_name: radcoringa-db
    env_file:
      - .env
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_ROOT_HOST: ${DB_HOST}
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./freeradius/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

  freeradius:
    build: ./freeradius
    container_name: radcoringa-radius
    env_file:
      - .env
    ports:
      - "1812:1812/udp"
      - "1813:1813/udp"
    depends_on:
      - mariadb

volumes:
  mariadb_data: