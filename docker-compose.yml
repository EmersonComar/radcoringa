services:
  mariadb:
    image: mariadb:11.4
    container_name: radcoringa-db
    env_file:
      - .env
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_ROOT_HOST: "%"
    command: --skip-ssl
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./freeradius/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  freeradius:
    build: ./freeradius
    container_name: radcoringa-radius
    env_file:
      - .env
    ports:
      - "1812:1812/tcp"
      - "1813:1813/tcp"
    depends_on:
      mariadb:
        condition: service_healthy

volumes:
  mariadb_data: